name: Run dev machine

on:
  workflow_dispatch:

jobs:
  my-dev-machine:
    runs-on: ubuntu-latest
    environment: main
    
    steps:
      
      - name: Setup pip cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cli

      - name: Install pip package
        run: pip3 install httpie

      - name: Checkout current revision of the project (library)
        uses: actions/checkout@v6

      - name: Run PowerShell
        shell: pwsh
        run: |
          Write-Host "Starting up"
          # Write-Output "[GH action] Starting up..." >> out.txt
          ./main.ps1 server -forever $false > /dev/null 2>&1
          # echo End >> out.txt 2>&1
          # echo End > /dev/null 2>&1
          Write-Host "Finished"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-out
          path: out.txt
