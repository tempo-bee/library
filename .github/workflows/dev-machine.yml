name: Run dev machine

on:
  workflow_dispatch:

jobs:
  my-dev-machine:
    runs-on: ubuntu-latest
    
    steps:
      
      - name: Setup pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install pip package
        run: pip install httpie

      - name: Run PowerShell
        shell: pwsh
        run: |
          Write-Host "ok there"
          Write-Output "Start again" >> out.txt
          python --version >> out.txt
          pip show httpie >> out.txt
          python -m httpie -h https://www.youtube.com >> out.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-out
          path: out.txt
